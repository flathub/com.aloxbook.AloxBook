app-id: com.aloxbook.AloxBook
tags:
  - proprietary
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: AloxBook

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri

modules:
  - name: aloxbook
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - cp -a AloxBook *.so* /app/bin/
      - install -Dm644 app_icon.png /app/share/icons/hicolor/256x256/apps/com.aloxbook.AloxBook.png
      - install -Dm644 app_icon.png /app/share/icons/hicolor/256x256/mimetypes/com.aloxbook.AloxBook-x-aloxbook.png
      - install -Dm644 com.aloxbook.AloxBook.desktop /app/share/applications/com.aloxbook.AloxBook.desktop
      - install -Dm644 com.aloxbook.AloxBook.metainfo.xml /app/share/metainfo/com.aloxbook.AloxBook.metainfo.xml
      - install -Dm644 com.aloxbook.AloxBook.mime.xml /app/share/mime/packages/com.aloxbook.AloxBook.mime.xml
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://www.aloxbook.com/downloads/flatpak/AloxBook-2.1.0-linux-x64.tar.xz
        sha256: 68ca0564a300814fe59d1f493ac19ac354170bdfc199b719e1dfbe82bd2bb5a2
        strip-components: 0
        x-checker-data:
          type: json
          url: https://www.aloxbook.com/releases/flathub-latest.json
          version-query: .version
          url-query: .sources.x86_64.url
          is-main-source: true

      - type: archive
        only-arches:
          - aarch64
        url: https://www.aloxbook.com/downloads/flatpak/AloxBook-2.1.0-linux-arm64.tar.xz
        sha256: 9570d47ef015ec68e22701fd502d9e9000f01645a5bdbc76d51bddb55a5bf402
        strip-components: 0
        x-checker-data:
          type: json
          url: https://www.aloxbook.com/releases/flathub-latest.json
          version-query: .version
          url-query: .sources.aarch64.url
